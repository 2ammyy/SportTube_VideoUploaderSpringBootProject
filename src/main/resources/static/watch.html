<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoStream - Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/watch.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand" onclick="location.href='index.html'">VIDEOSTREAM</div>
    <div class="nav-search">
        <input type="search" id="searchInput" placeholder="Search videos..." onkeyup="handleSearch(event)">
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <div class="notification-bell" id="notificationBell" onclick="toggleNotifications()">
            <span id="bellIcon">🔔</span><span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
        </div>
        <div class="notifications-dropdown" id="notificationsDropdown">
            <div class="notif-header">
                <h4>Notifications</h4>
                <a onclick="markAllNotificationsRead()" style="color:#e50914;cursor:pointer;font-size:12px;">Mark all read</a>
            </div>
            <div id="notificationsList"></div>
        </div>
        <div class="user-profile" onclick="toggleProfileDropdown()">
            <div class="user-avatar" id="userAvatar">U</div>
            <span id="userName">Guest</span>
        </div>
        <div class="profile-dropdown" id="profileDropdown">
            <div style="padding:10px 20px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px;" id="dropdownUserInfo">
                <div class="user-avatar" id="dropdownAvatar" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#fff;flex-shrink:0;">👤</div>
                <div>
                    <div id="dropdownUserName" style="font-weight:600;">Guest</div>
                    <div style="font-size:11px;color:#888;" id="userEmail">Not logged in</div>
                </div>
            </div>
            <a id="myChannelLink" onclick="if(currentUser){window.location.href='profile.html?userId='+currentUser.id}else{showLogin()}" style="display:none;">👤 My Channel</a>
            <a id="loginSignupLink" onclick="showLogin()">🔐 Login / Signup</a>
            <a id="logoutLink" onclick="logout()" style="display:none;">🚪 Logout</a>
        </div>
    </div>
</nav>

<div class="watch-container">
    <div class="watch-main">
        <div class="video-player-wrapper" id="playerWrapper">
            <video id="videoPlayer" controls autoplay muted preload="metadata">
                Your browser does not support the video tag.
            </video>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>

        <h1 class="video-title-main" id="videoTitle">Loading...</h1>

        <div class="video-meta-bar">
            <div class="video-stats" id="videoStats"></div>
            <div class="action-buttons">
                <div class="action-group">
                    <button class="action-btn" id="likeBtn" onclick="likeVideo()">
                        <span>👍</span> <span id="likeCount">0</span>
                    </button>
                    <button class="action-btn" id="dislikeBtn" onclick="dislikeVideo()">
                        <span>👎</span> <span id="dislikeCount">0</span>
                    </button>
                </div>
                <button class="action-btn" onclick="shareVideo()">Share</button>
                <button class="action-btn" id="playlistBtn" onclick="showAddToPlaylistModal(currentVideoId)" style="display:none;">+ Playlist</button>
                <button class="action-btn" onclick="openReportModal()" id="reportBtn">Report</button>
            </div>
        </div>

        <div class="channel-bar" id="channelBar">
            <div class="channel-details">
                <div class="channel-avatar" id="channelAvatar">C</div>
                <div>
                    <div class="channel-name" id="channelName">Loading channel...</div>
                    <div class="subscriber-count" id="subscriberCount">0 subscribers</div>
                </div>
            </div>
            <button class="subscribe-btn" id="subscribeBtn" onclick="subscribeChannel()" style="display:none;">Subscribe</button>
            <button class="save-btn" id="saveBtn" onclick="toggleSave()" style="display:none;">Save</button>
        </div>

        <div class="video-description" id="videoDescriptionSection">
            <div class="description-content" id="descriptionContent">
                <p id="descriptionText" style="color:#aaa;">No description</p>
            </div>
            <div class="description-edit" id="descriptionEdit" style="display:none;">
                <textarea id="editDescription" rows="3" placeholder="Add a description..."></textarea>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel" style="display:none;">
            <h3>Video Settings</h3>
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Title</label>
                    <input type="text" id="editTitle" placeholder="Video title">
                </div>
                <div class="setting-group">
                    <label>Privacy</label>
                    <select id="editPrivacy">
                        <option value="public">Public</option>
                        <option value="private">Private</option>
                    </select>
                </div>
            </div>
            <div class="setting-group">
                <label>Description</label>
                <textarea id="editDescriptionFull" rows="4" placeholder="Describe your video..."></textarea>
            </div>
            <div class="settings-actions">
                <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
            </div>
        </div>

        <div class="comments-section-main">
            <h3>Comments <span id="commentCount"></span></h3>
            <div class="comment-input-main" id="commentInputSection" style="display:none;">
                <div class="user-avatar-small" id="commentAvatar">U</div>
                <div style="flex:1;">
                    <input type="text" id="commentInput" placeholder="Add a comment...">
                    <div class="comment-actions">
                        <button class="btn-secondary" onclick="document.getElementById('commentInput').value=''">Cancel</button>
                        <button class="btn-primary" id="submitCommentBtn">Comment</button>
                    </div>
                </div>
            </div>
            <div id="commentsList"></div>
        </div>
    </div>

    <div class="watch-sidebar">
        <div id="playlistSidebar" style="display:none;">
            <div class="playlist-sidebar-header">
                <h4 id="playlistSidebarName" style="margin:0 0 4px 0;font-size:14px;"></h4>
                <div style="font-size:12px;color:#888;" id="playlistSidebarMeta"></div>
            </div>
            <div id="playlistSidebarVideos" style="max-height:400px;overflow-y:auto;"></div>
        </div>
        <h3 class="sidebar-title">Recommended</h3>
        <div id="recommendedVideos"></div>
    </div>
</div>

<div id="reportModal" class="auth-modal" style="display:none;">
    <span class="close-btn" onclick="closeReportModal()">&times;</span>
    <div class="auth-modal-content">
        <div class="auth-modal-header">Report Video</div>
        <select id="reportReason" class="auth-input">
            <option value="SPAM">Spam or misleading</option>
            <option value="INAPPROPRIATE">Inappropriate content</option>
            <option value="COPYRIGHT">Copyright infringement</option>
            <option value="OTHER">Other</option>
        </select>
        <textarea id="reportDescription" class="auth-input" placeholder="Additional details..." rows="3"></textarea>
        <button class="btn-primary" style="width:100%;" onclick="submitReport()">Submit Report</button>
    </div>
</div>

<script src="js/app.js?v=4"></script>
<script src="js/watch.js?v=4"></script>
</body>
</html>
