<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoStream - Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand" onclick="location.href='index.html'">VIDEOSTREAM</div>
    <div class="nav-search">
        <input type="text" name="fakeuser" style="display:none" tabindex="-1">
        <input type="password" name="fakepass" style="display:none" tabindex="-1">
        <input type="search" id="searchInput" placeholder="🔍 Search videos..." onkeyup="searchVideos()" onkeydown="searchKeydown(event)" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" tabindex="0">
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#" onclick="openUploadModal()">+ Upload</a>
        <div class="user-profile" onclick="toggleProfileDropdown()">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span id="userName">Guest</span>
        </div>
        <div class="profile-dropdown" id="profileDropdown">
            <div style="padding:10px 20px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px;" id="dropdownUserInfo">
                <div class="user-avatar" id="dropdownAvatar" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#fff;flex-shrink:0;">👤</div>
                <div>
                    <div id="dropdownUserName" style="font-weight:600;">Guest</div>
                    <div style="font-size:11px;color:#888;" id="userEmail">Not logged in</div>
                </div>
            </div>
            <a id="myChannelLink" onclick="if(currentUser){window.location.href='profile.html?userId='+currentUser.id}else{showLogin()}">👤 My Channel</a>
            <a id="loginSignupLink" onclick="showLogin()">🔐 Login / Signup</a>
            <a id="logoutLink" onclick="logout()" style="display:none;">🚪 Logout</a>
        </div>
    </div>
</nav>

<div class="profile-header" id="profileHeader">
    <div class="profile-avatar" id="profileAvatar">?</div>
    <div class="profile-info">
        <h1 id="profileUsername">Loading...</h1>
        <p id="profileStats"></p>
        <div class="profile-actions" id="profileActions"></div>
    </div>
</div>

<div class="container">
    <div class="profile-tabs" id="profileTabs">
        <button class="profile-tab active" onclick="switchProfileTab('videos')">Uploads</button>
        <button class="profile-tab" onclick="switchProfileTab('playlists')">Playlists</button>
        <button class="profile-tab" id="savedTab" onclick="switchProfileTab('saved')" style="display:none;">Saved Videos</button>
    </div>
    <div id="profileTabVideos" class="profile-tab-content active"></div>
    <div id="profileTabPlaylists" class="profile-tab-content">
        <div class="playlist-section-header">
            <h3>Playlists</h3>
            <button id="newPlaylistBtn" class="btn-edit-profile" style="display:none;" onclick="openCreatePlaylistModal()">+ New Playlist</button>
        </div>
        <div class="playlist-grid" id="profilePlaylistsGrid"></div>
    </div>
    <div id="profileTabSaved" class="profile-tab-content"></div>
</div>

<!-- Account Settings Modal -->
<div class="edit-modal" id="accountModal">
    <div class="edit-modal-content">
        <h2>Account Settings</h2>

        <h3 style="color:#ccc;font-size:14px;margin:16px 0 8px;">Avatar</h3>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
            <div class="profile-avatar" id="settingsAvatar" style="width:64px;height:64px;font-size:24px;">?</div>
            <div>
                <button class="btn-edit-profile" onclick="document.getElementById('avatarUploadInput').click()">Upload Photo</button>
                <input type="file" id="avatarUploadInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                <p style="color:#888;font-size:11px;margin-top:4px;">Square image recommended, max 2MB</p>
            </div>
        </div>

        <div style="margin-bottom:16px;">
            <p style="color:#aaa;font-size:13px;margin-bottom:8px;">Or choose a color:</p>
            <div class="color-picker" id="settingsColorPicker" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
        </div>

        <h3 style="color:#ccc;font-size:14px;margin:16px 0 8px;">Change Password</h3>
        <input type="password" id="oldPassword" class="auth-input" placeholder="Current password" style="margin-bottom:8px;">
        <input type="password" id="newPassword" class="auth-input" placeholder="New password" style="margin-bottom:8px;">
        <button class="btn-edit-profile" onclick="changePassword()">Update Password</button>

        <h3 style="color:#ccc;font-size:14px;margin:20px 0 8px;">Danger Zone</h3>
        <button style="background:#e50914;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-weight:600;" onclick="deleteAccount()">Delete Account</button>
        <p style="color:#888;font-size:11px;margin-top:4px;">This will permanently delete your account and all videos.</p>

        <div class="edit-modal-actions">
            <button class="btn-edit-profile" onclick="document.getElementById('accountModal').classList.remove('show')">Close</button>
        </div>
    </div>
</div>

<script src="js/app.js?v=4"></script>
<script>
const COLORS = ['#667eea','#e50914','#4caf50','#2196f3','#ff9800','#9c27b0','#f44336','#00bcd4','#e91e63','#3f51b5','#009688','#ff5722'];

let profileUserId = null;
let isOwnProfile = false;
let profileVideos = [];

function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

async function loadProfile() {
    profileUserId = getQueryParam('userId');
    if (!profileUserId) {
        if (currentUser) {
            profileUserId = currentUser.id;
        } else {
            document.getElementById('profileUsername').textContent = 'No user specified';
            return;
        }
    }

    isOwnProfile = currentUser && currentUser.id === profileUserId;

    try {
        const userRes = await fetch(`${API_BASE}/auth/users/${profileUserId}`);
        if (!userRes.ok) throw new Error('User not found');
        const userData = await userRes.json();

        document.getElementById('profileUsername').textContent = userData.username;
        const avatarEl = document.getElementById('profileAvatar');

        // Show avatar image if available, otherwise colored circle
        if (userData.avatarPath) {
            avatarEl.innerHTML = '<img src="' + API_BASE + '/auth/users/' + profileUserId + '/avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
            avatarEl.style.background = 'none';
        } else {
            avatarEl.textContent = userData.username.charAt(0).toUpperCase();
            avatarEl.style.background = userData.avatarColor || '#667eea';
        }

        document.getElementById('profileStats').textContent = profileVideos.length + ' videos';

        // Fetch subscriber count
        try {
            const subRes = await fetch(`${API_BASE}/channels/${profileUserId}/subscribers`);
            if (subRes.ok) {
                const subData = await subRes.json();
                const count = subData.count || 0;
                document.getElementById('profileStats').textContent = profileVideos.length + ' videos · ' + count + ' subscriber' + (count !== 1 ? 's' : '');
            }
        } catch (e) {}

        const actionsDiv = document.getElementById('profileActions');
        if (isOwnProfile) {
            actionsDiv.innerHTML = `
                <button class="btn-edit-profile" onclick="showAccountSettings()">Account Settings</button>
            `;
        }
    } catch (e) {
        document.getElementById('profileUsername').textContent = 'User not found';
    }

    try {
        const vidRes = await fetch(`${API_BASE}/videos/user/${profileUserId}`);
        if (vidRes.ok) {
            profileVideos = await vidRes.json();
            displayProfileVideos(profileVideos);
            document.getElementById('profileStats').textContent = profileVideos.length + ' videos';
        }
    } catch (e) {
        document.getElementById('profileTabVideos').innerHTML = '<div class="loading">Failed to load videos</div>';
    }

    // Load playlists
    try {
        const plRes = await fetch(`${API_BASE}/playlists/user/${profileUserId}`);
        if (plRes.ok) {
            const playlists = await plRes.json();
            displayPlaylists(playlists, 'profilePlaylistsGrid');
        }
    } catch (e) {
        document.getElementById('profilePlaylistsGrid').innerHTML = '<div class="loading">Failed to load playlists</div>';
    }

    // Show saved tab + new playlist button + load saved videos only for own profile
    if (isOwnProfile) {
        document.getElementById('savedTab').style.display = 'inline-block';
        document.getElementById('newPlaylistBtn').style.display = 'block';
        loadProfileSavedVideos();
    }
}

async function loadProfileSavedVideos() {
    if (!authToken) return;
    try {
        const res = await fetch(`${API_BASE}/videos/saved`, {
            headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
            const saved = await res.json();
            const container = document.getElementById('profileTabSaved');
            if (saved.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">No saved videos yet.</div>';
                return;
            }
            let html = '<div class="videos-grid">';
            for (const v of saved) {
                const displayTitle = v.videoTitle || 'Video';
                html += '<div class="video-card" data-video-id="' + v.videoId + '">' +
                    '<div class="video-thumbnail">' +
                        '<img src="' + (v.thumbnailPath ? API_BASE + '/videos/' + v.videoId + '/thumbnail' : 'https://via.placeholder.com/320x180?text=No+Thumbnail') + '" alt="' + escapeXml(displayTitle) + '">' +
                        '<div class="play-overlay"></div>' +
                    '</div>' +
                    '<div class="video-info">' +
                        '<div class="video-title">' + escapeXml(displayTitle) + '</div>' +
                        '<div class="channel-row" onclick="event.stopPropagation();window.location.href=\'profile.html?userId=' + v.uploaderUserId + '\'">' +
                            '<div class="channel-avatar" style="background:' + (v.avatarColor || '#667eea') + '">' + channelAvatarHtml(v) + '</div>' +
                            '<span class="channel-name">' + escapeXml(v.username || 'Unknown') + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
            setTimeout(() => {
                container.querySelectorAll('.video-card').forEach(card => {
                    card.addEventListener('click', function() {
                        window.location.href = 'watch.html?id=' + this.getAttribute('data-video-id');
                    });
                });
            }, 0);
        }
    } catch (e) {}
}

function switchProfileTab(tab) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.profile-tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`.profile-tab[onclick*="'${tab}'"]`).classList.add('active');
    document.getElementById('profileTab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function displayProfileVideos(videos) {
    const container = document.getElementById('profileTabVideos');
    if (videos.length === 0) {
        container.innerHTML = '<div class="loading">No videos uploaded yet</div>';
        return;
    }

    let html = '<div class="videos-grid">';
    for (const v of videos) {
        const displayTitle = v.title || v.originalFilename || 'Video';
        html += '<div class="video-card" data-video-id="' + v.id + '">' +
            (isOwnProfile ? '<button class="btn-edit-video" onclick="event.stopPropagation();openEditVideo(\'' + v.id + '\')">✏️</button>' : '') +
            (isOwnProfile ? '<button class="btn-delete-video" onclick="event.stopPropagation();deleteVideo(\'' + v.id + '\')">✕ Delete</button>' : '') +
            '<div class="video-thumbnail">' +
                '<img src="' + getThumbnail(v) + '" alt="' + escapeXml(displayTitle) + '">' +
                '<div class="play-overlay"></div>' +
                '<div class="preview-overlay"></div>' +
                getStatusBadge(v.status) +
            '</div>' +
            '<div class="video-info">' +
                '<div class="video-title">' + escapeXml(displayTitle) + '</div>' +
                '<div class="video-meta">' +
                    '<span>📅 ' + new Date(v.createdAt).toLocaleDateString() + '</span>' +
                '</div>' +
            '</div>' +
        '</div>';
    }
    html += '</div>';
    container.innerHTML = html;

    setTimeout(() => {
        container.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', function() {
                const videoId = this.getAttribute('data-video-id');
                window.location.href = 'watch.html?id=' + videoId;
            });
        });
    }, 0);
}

function showAccountSettings() {
    document.getElementById('accountModal').classList.add('show');
    // Update avatar preview
    const avatarEl = document.getElementById('settingsAvatar');
    if (currentUser) {
        // Try to show current avatar
        const profileAvatar = document.getElementById('profileAvatar');
        if (profileAvatar.querySelector('img')) {
            avatarEl.innerHTML = profileAvatar.querySelector('img').cloneNode(true);
            avatarEl.style.background = 'none';
        } else {
            avatarEl.textContent = currentUser.username.charAt(0).toUpperCase();
            avatarEl.style.background = profileAvatar.style.background || '#667eea';
        }
    }
    // Render color picker inline
    const picker = document.getElementById('settingsColorPicker');
    picker.innerHTML = COLORS.map(c =>
        '<div class="color-swatch" style="background:' + c + '" onclick="selectAvatarColorInline(\'' + c + '\')"></div>'
    ).join('');
}

async function selectAvatarColorInline(color) {
    if (!currentUser) return;
    try {
        const res = await fetch(`${API_BASE}/auth/users/profile`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ avatarColor: color })
        });
        if (res.ok) {
            const initial = currentUser.username.charAt(0).toUpperCase();
            const settingsAvatar = document.getElementById('settingsAvatar');
            settingsAvatar.innerHTML = '';
            settingsAvatar.textContent = initial;
            settingsAvatar.style.background = color;
            // Update profile header too
            const profileAvatar = document.getElementById('profileAvatar');
            profileAvatar.innerHTML = '';
            profileAvatar.textContent = initial;
            profileAvatar.style.background = color;
            showToast('Avatar color updated!', 'success');
        }
    } catch (e) {
        showToast('Failed to update avatar', 'error');
    }
}

async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
        showToast('Image must be under 2MB', 'error');
        return;
    }
    const formData = new FormData();
    formData.append('file', file);
    try {
        const res = await fetch(`${API_BASE}/auth/users/avatar`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + authToken },
            body: formData
        });
        if (res.ok) {
            showToast('Avatar uploaded!', 'success');
            // Show uploaded image in preview immediately
            const avatarEl = document.getElementById('settingsAvatar');
            avatarEl.innerHTML = '<img src="' + API_BASE + '/auth/users/' + currentUser.id + '/avatar?t=' + Date.now() + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
            avatarEl.style.background = 'none';
            document.getElementById('profileAvatar').innerHTML = avatarEl.innerHTML;
            document.getElementById('profileAvatar').style.background = 'none';
            showToast('Avatar updated!', 'success');
            document.getElementById('accountModal').classList.remove('show');
        } else {
            const err = await res.text();
            showToast('Upload failed: ' + err, 'error');
        }
    } catch (e) {
        showToast('Upload failed', 'error');
    }
    input.value = '';
}

async function changePassword() {
    const oldPw = document.getElementById('oldPassword').value;
    const newPw = document.getElementById('newPassword').value;
    if (!oldPw || !newPw) {
        showToast('Fill in both fields', 'error');
        return;
    }
    if (newPw.length < 6) {
        showToast('New password must be at least 6 characters', 'error');
        return;
    }
    try {
        const res = await fetch(`${API_BASE}/auth/users/password`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
        });
        if (res.ok) {
            showToast('Password changed!', 'success');
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
        } else {
            const err = await res.json();
            showToast(err.error || 'Failed', 'error');
        }
    } catch (e) {
        showToast('Failed to change password', 'error');
    }
}

async function deleteAccount() {
    if (!confirm('Are you sure you want to permanently delete your account and all videos? This cannot be undone!')) return;
    if (!confirm('Really delete? All your videos will be gone forever.')) return;
    try {
        const res = await fetch(`${API_BASE}/auth/users/account`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
            showToast('Account deleted', 'success');
            logout();
            window.location.href = 'index.html';
        } else {
            const err = await res.json();
            showToast(err.error || 'Delete failed', 'error');
        }
    } catch (e) {
        showToast('Delete failed', 'error');
    }
}

function openEditVideo(videoId) {
    const v = profileVideos.find(x => x.id === videoId);
    if (!v) return;
    document.getElementById('editVideoId').value = videoId;
    document.getElementById('editVideoTitle').value = v.title || '';
    document.getElementById('editVideoDescription').value = v.description || '';
    document.getElementById('editVideoPrivacy').value = v.privacy || 'public';
    document.getElementById('editVideoModal').classList.add('show');
    // Setup mention on edit description
    setTimeout(() => setupMentionOnInput(document.getElementById('editVideoDescription')), 100);
}

function closeEditVideo() {
    document.getElementById('editVideoModal').classList.remove('show');
}

async function saveEditVideo() {
    const videoId = document.getElementById('editVideoId').value;
    const title = document.getElementById('editVideoTitle').value;
    const description = document.getElementById('editVideoDescription').value;
    const privacy = document.getElementById('editVideoPrivacy').value;

    try {
        const res = await fetch(`${API_BASE}/videos/${videoId}/settings`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ title, description, privacy })
        });
        if (res.ok) {
            closeEditVideo();
            showToast('Video updated!', 'success');
            loadProfile();
        } else {
            const err = await res.text();
            showToast('Update failed: ' + err, 'error');
        }
    } catch (e) {
        showToast('Update failed', 'error');
    }
}

async function deleteVideo(videoId) {
    if (!confirm('Delete this video permanently?')) return;
    try {
        const res = await fetch(`${API_BASE}/videos/${videoId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
            showToast('Video deleted', 'success');
            loadProfile();
        } else {
            const err = await res.text();
            showToast('Delete failed: ' + err, 'error');
        }
    } catch (e) {
        showToast('Delete failed', 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(loadProfile, 100);
});
</script>
</body>
</html>
